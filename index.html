<style>
 #nameModal {

  backdrop-filter: blur(8px);

  z-index: 999;

  animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.modal-box {
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(12px);

  padding: 30px;
  border-radius: 20px;

  width: 90%;
  max-width: 420px;

}

@keyframes scaleIn {
  from {
    transform: scale(0.9);

  to {
    transform: scale(1);
    opacity: 1;
  }
}
  .modal-box input {

  padding: 14px;
  margin-top: 15px;

  border-radius: 12px;
  border: none;

  background: #111;
  color: white;

.modal-box button {

.modal-box button:hover {

* {

  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

body {

  overflow-x: hidden;

}

/* BACKGROUND FULL */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: url("assets/images/background.png") center/cover no-repeat;
  z-index: 0;
}

/* MAIN LAYOUT */
.container {
  display: flex;
  height: 100vh;
  position: relative;
  z-index: 2;
}
.login-card {
  align-self: center;
  margin-top: 20px;
}
/* LEFT */
.left {
  width: 50%;
  padding: 60px 80px;
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  align-items: flex-start;   
  text-align: left;          
  position: relative;        
}

/* LOGO */
.logo img {
  height: 40px;

}

/* TITLE */
h1 {

}
/* INPUT */
.input-box {
  display: flex;
  width: 100%;
  background: black;
  border-radius: 999px;
  overflow: hidden;
}

.input-box input {
  flex: 1;
  padding: 16px;
  border: none;
  color: white;

  font-size: 16px;
}

.input-box button {
  background: #facc15;
  border: none;
  padding: 0 20px;
  cursor: pointer;
  font-size: 18px;
}

/* DIVIDER */
.divider {
  width: 420px;
  text-align: center;
  margin: 30px 0;
  position: relative;
}

.divider::before,
.divider::after {
  content: "";
  position: absolute;
  top: 50%;
  width: 40%;
  height: 1px;
  background: #aaa;
}

.divider::before { left: 0; }
.divider::after { right: 0; }

.divider span {
  background: transparent;
  padding: 0 10px;
  color: #555;
}

/* FOOTER */
.footer {
  margin-top: 80px;
  font-size: 14px;
}

/* RIGHT */
.right {
  width: 50%;
  position: relative;
}

/* ATOM */
.atom {
  position: absolute;
  right: -160px;
  top: 50%;
  transform: translateY(-50%);
  width: 900px;
  z-index: 2;
  filter: drop-shadow(0 20px 40px rgba(0,0,0,0.2));
}
  .wallet {
  display: flex;
  justify-content: space-between;
  align-items: center;

  padding: 14px 18px;
  margin-top: 15px;

  border-radius: 14px;

  transition: 0.2s;
}

.wallet:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(0,0,0,0.1);
}

.wallet-left {
  display: flex;
  align-items: center;
  gap: 10px;
}
.login-card {
  width: 460px;
  padding: 30px;
  background: linear-gradient(145deg, #f3f3f3, #e6e6e6);
  border-radius: 20px;
  box-shadow:
    0 10px 30px rgba(0,0,0,0.1),
    inset 0 1px 1px rgba(255,255,255,0.6);
  margin-top: 10px;
}
  /* CONTACT */
.contact {
  position: absolute;
  bottom: 40px;
  left: 80px;
}

.contact-title {
  font-weight: 700;
  font-size: 14px;
  margin-bottom: 12px;
}

.contact-icons {
  display: flex;
  gap: 16px;
}

.contact-icons img {
  width: 28px;
  height: 28px;

  cursor: pointer;

  opacity: 0.7;
  transition: 0.25s;
}

.contact-icons img:hover {
  transform: scale(1.2);
  opacity: 1;
}
  @media (max-width: 768px) {

  /* 1. CHUYỂN LAYOUT DỌC */
  .container {
    flex-direction: column;
    height: auto;
  }

  /* 2. LEFT FULL WIDTH */
  .left {
  width: 100%;   
  position: relative;
  z-index: 2;
  padding: 30px 20px;
}

  /* 3. TEXT NHỎ LẠI */
  h1 {
    font-size: 36px;
    line-height: 1.2;
  }

  .subtitle {
    font-size: 18px;
    max-width: 100%;
  }

  /* 4. LOGIN FULL WIDTH */
  .login-card {
    width: 100%;
  }

  .input-box,
  .divider {
    width: 100%;
  }

  /* 5. RIGHT → KHÔNG ĐÈ */
  .right {
  position: absolute;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}

  /* 6. ATOM NHỎ LẠI */
 .atom {
  position: absolute;
  width: 350px;

  top: 55%;
  left: 50%;
  transform: translate(-50%, -50%);

  z-index: 0;
  opacity: 0.35;

  filter: blur(0.3px); /* subtle */
}

  /* 7. CONTACT KHÔNG FIXED */
  .contact {
  position: relative;
  margin-top: 60px;
  align-items: flex-start;
}
    .subtitle {
  word-break: keep-all;
}
    .login-card {
  backdrop-filter: blur(10px);
}

}
 .spinner {
  width:40px;
  height:40px;
  border:4px solid rgba(255,255,255,0.3);
  border-top:4px solid white;
  border-radius:50%;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}
</style>
</head>

<!-- FIREBASE -->
<script src="./sessionService.js"></script>
<script type="module">
 import { 
  getAuth, 
  signInAnonymously,
  sendEmailVerification,
  sendPasswordResetEmail
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
const auth = getAuth();
  import { getUserByWallet, createUser } from "./userService.js";
  import { loginWithEmail } from "./authEmail.js";

window.loginWithEmail = loginWithEmail;
  window.getUserByWallet = getUserByWallet;
window.createUser = createUser;
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, setDoc, doc, getDoc, updateDoc } 
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCO3BvrQ0GAmIebCwueVd88Do1YGk_iYJo",
    authDomain: "hackchem-90922.firebaseapp.com",
    projectId: "hackchem-90922",
    storageBucket: "hackchem-90922.firebasestorage.app",
    messagingSenderId: "86265015549",
    appId: "1:86265015549:web:b7981ab509a1e06363a294"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  window.db = db;
  window.doc = doc;
  window.getDoc = getDoc;
  window.updateDoc = updateDoc;

  window.saveUser = async function(uid) {
  await setDoc(doc(db, "users", uid), {
    updatedAt: new Date().toISOString()
  }, { merge: true });
}
  
let walletAddress = "";

// CONNECT WALLET (MetaMask chuẩn)
window.connectWallet = async function() {
showLoading();
  if (!window.ethereum) {
    alert("Bạn cần cài MetaMask!");
    return;
  }

  try {
    if(!auth.currentUser){
      await signInAnonymously(auth);
    }

    // 1. CONNECT
    const accounts = await window.ethereum.request({
      method: "eth_requestAccounts"
    });

    walletAddress = accounts[0];
const wallet = walletAddress;

// Resolve wallet owner trước để tránh ghi đè mapping sai user
let uid = window.sessionService.getUid();
let walletOwnerUid = null;

try{
  walletOwnerUid = await getUserByWallet(wallet);
}catch(walletLookupErr){
  if(walletLookupErr?.code !== "permission-denied" && walletLookupErr?.code !== "firestore/permission-denied"){
    throw walletLookupErr;
  }
}

// Nếu wallet đã có owner khác với uid hiện tại -> luôn ưu tiên owner của wallet
if(walletOwnerUid && uid && walletOwnerUid !== uid){
  uid = walletOwnerUid;
}

// Nếu chưa có uid session thì dùng owner theo wallet (nếu có)
if(!uid && walletOwnerUid){
  uid = walletOwnerUid;
}

// Chưa có owner thì tạo mới và gán wallet -> uid mới
if(!uid){
  if(!auth.currentUser){
    throw new Error("missing-auth-user");
  }
  uid = auth.currentUser.uid;
  await createUser({ wallet, uid });
}else if(!walletOwnerUid){
  // Có uid nhưng wallet chưa được map -> link wallet vào uid này
  await setDoc(doc(db, "users", uid), {
    wallet: wallet,
    "providers.wallet": true
  }, { merge: true });

  await setDoc(doc(db, "wallet_index", wallet), {
    uid: uid
  });
}
    // 2. CHECK NETWORK (Sepolia)
    let chainId = await ethereum.request({
      method: "eth_chainId"
    });

    if (chainId !== "0xaa36a7") {
      try {
        await ethereum.request({
          method: "wallet_switchEthereumChain",
          params: [{ chainId: "0xaa36a7" }]
        });
      } catch (err) {

        // nếu chưa có mạng → thêm luôn
        if (err.code === 4902) {
          await ethereum.request({
            method: "wallet_addEthereumChain",
            params: [{
              chainId: "0xaa36a7",
              chainName: "Sepolia",
              rpcUrls: ["https://rpc.sepolia.org"],
              nativeCurrency: {
                name: "ETH",
                symbol: "ETH",
                decimals: 18
              },
              blockExplorerUrls: ["https://sepolia.etherscan.io"]
            }]
          });
        }
      }
    }

    // 3. SIGN (bắt buộc)
    const message = "Login HackChem - " + Date.now();

    await ethereum.request({
      method: "personal_sign",
      params: [message, walletAddress]
    });

    // 4. SAVE
    const oldWallet = window.sessionService.getWallet();

if(oldWallet && oldWallet !== walletAddress){
  window.sessionService.clearUid(); // 🔥 reset toàn bộ
}
    window.sessionService.setCurrentWallet(walletAddress);
window.sessionService.setCurrentUid(uid);

    // 5. FIREBASE
    await window.saveUser(uid);

    // 6. CHECK FIRST TIME
    const isFirst = await checkFirstTime();

    if (!isFirst) {
      window.location.href = "home.html";
    }

  }catch (err) {
  console.error(err);
  alert("Kết nối ví thất bại");
  hideLoading(); // 🔥 THÊM
}
}

// CHECK FIRST
function isPermissionDeniedError(err) {
  return err?.code === "permission-denied" || err?.code === "firestore/permission-denied";
}

function getFallbackUid() {
  return auth?.currentUser?.uid || null;
}

async function getUserSnapshotByUid(uid) {
  const ref = window.doc(window.db, "users", uid);
  return window.getDoc(ref);
}

async function checkFirstTime() {

  const sessionUid = window.sessionService.getUid();
  const fallbackUid = getFallbackUid();
  let snapshot = null;
  let effectiveUid = sessionUid || fallbackUid;

  if (!effectiveUid) {
    return false;
  }

  try {
    snapshot = await getUserSnapshotByUid(effectiveUid);
  } catch (err) {
    if (!isPermissionDeniedError(err)) {
      throw err;
    }
    if (!fallbackUid || fallbackUid === effectiveUid) {
      throw err;
    }
    effectiveUid = fallbackUid;
    window.sessionService.setCurrentUid(effectiveUid);
    snapshot = await getUserSnapshotByUid(effectiveUid);
  }

  if (snapshot.exists()) {
    const data = snapshot.data();

   if (!data.name || data.name.trim() === "") {
    hideLoading();
      document.getElementById("nameModal").style.display = "flex";
      return true;
    }
  }

  return false;
}

// SAVE NAME
window.saveName = async function() {

  const name = document.getElementById("usernameInput").value;

  if (!name) {
    alert("Nhập tên đi!");
    return;
  }

  const sessionUid = window.sessionService.getUid();
  const fallbackUid = getFallbackUid();
  let effectiveUid = sessionUid || fallbackUid;

  if (!effectiveUid) {
    alert("Phiên đăng nhập đã hết hạn, vui lòng đăng nhập lại!");
    return;
  }

  try {
    const ref = window.doc(window.db, "users", effectiveUid);
    await window.updateDoc(ref, {
      name: name
    });
  } catch (err) {
    if (!isPermissionDeniedError(err)) {
      throw err;
    }
    if (!fallbackUid || fallbackUid === effectiveUid) {
      throw err;
    }
    effectiveUid = fallbackUid;
    window.sessionService.setCurrentUid(effectiveUid);
    const ref = window.doc(window.db, "users", effectiveUid);
    await window.updateDoc(ref, {
      name: name
    });
  }

  document.getElementById("nameModal").style.display = "none";

  window.location.href = "home.html";
}
  // ============================
// 🔥 LOGIN EMAIL
// ============================
window.loginEmail = async function(){

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  if(!email || !password){
    alert("Nhập email và password!");
    return;
  }

  try{

    localStorage.clear();

    let result = await loginWithEmail(email, password);

    // ❌ EMAIL CHƯA VERIFY → KHÔNG LOADING
    if(result === "NOT_VERIFIED"){
      showResendUI();
      return;
    }

    if(!result){
      return;
    }

    // ✅ TỪ ĐÂY MỚI BẮT ĐẦU LOADING
    showLoading(); // 🔥 CHUYỂN XUỐNG ĐÂY

    let uid = result;

    window.sessionService.setCurrentUid(uid);

    const isFirst = await checkFirstTime();

    if (!isFirst) {
      window.location.href = "home.html";
    } else {
      hideLoading();
    }

  }catch(err){
    console.error(err);
    alert("Login email failed");
    hideLoading();
  }
}
 window.showResendUI = function(){
  document.getElementById("resendBox").style.display = "block";
}
 window.resendVerify = async function(){

  const email = localStorage.getItem("pending_verify_email");

  if(!email){
    alert("Không tìm thấy email!");
    return;
  }

  const user = auth.currentUser;

  if(!user){
    alert("Phiên đăng nhập hết hạn, login lại!");
    return;
  }

  // 🔥 cooldown
  const last = localStorage.getItem("last_resend_time");
  const now = Date.now();

  if(last && now - last < 60000){
    alert("⏳ Vui lòng chờ 60s trước khi gửi lại!");
    return;
  }

  await sendEmailVerification(user);

  localStorage.setItem("last_resend_time", now);

  alert("📩 Đã gửi lại email!");
}
 window.showResetBox = function(){
  document.getElementById("resetBox").style.display = "block";
}
 window.resetPassword = async function(){

  const email = document.getElementById("resetEmail").value.trim().toLowerCase();

  if(!email){
    alert("Nhập email!");
    return;
  }

  try{

    await sendPasswordResetEmail(auth, email);

    alert("📩 Đã gửi link đặt lại mật khẩu! Kiểm tra email.");

  }catch(err){
    console.error(err);

    if(err.code === "auth/user-not-found"){
      alert("Email chưa đăng ký!");
    }else{
      alert("Có lỗi xảy ra!");
    }
  }
}
 window.togglePassword = function(){
  const input = document.getElementById("password");
  const openIcon = document.getElementById("eyeOpen");
  const closedIcon = document.getElementById("eyeClosed");
  if(input.type === "password"){
    input.type = "text";
    openIcon.style.display = "none";
    closedIcon.style.display = "block";
  }else{
    input.type = "password";
    openIcon.style.display = "block";
    closedIcon.style.display = "none";
  }
}
 function showLoading(){
  document.getElementById("loadingOverlay").style.display = "flex";
}

function hideLoading(){
  document.getElementById("loadingOverlay").style.display = "none";
}
