async function uploadToIPFS(file){

  const formData = new FormData();
  formData.append("file", file);

  const res = await fetch("https://api.pinata.cloud/pinning/pinFileToIPFS", {
    method: "POST",
    headers: {
      Authorization: `Bearer ${PINATA_JWT}`

    body: formData
  });

  if(!data.IpfsHash){

  }

  return data.IpfsHash;

/* LOAD LOCAL */
function loadProgress(){
  const d = JSON.parse(localStorage.getItem(progressKey));
  if(!d) return;

  current = d.current || 0;
  questionState = d.answers || {};
  score = d.score || 150;

  correctCount = Object.values(questionState).filter(v=>v==="correct").length;
}

/* SAVE LOCAL */
function saveProgress(){
  localStorage.setItem(progressKey, JSON.stringify({
    current,
    answers: questionState,
    score
  }));
}

/* BEST */
function saveBest(){
  if(score > best){
    best = score;
    localStorage.setItem(bestKey, best);

    setDoc(doc(db,"users",userId,"stats","best_"+lessonId),{
      best
    });
  }
  bestScore.innerText = best;
}

/* UI */
function updateScore(){ scoreValue.innerText = score; }

function updateXP(){
  const percent = correctCount / questions.length * 100;
  xpFill.style.width = percent + "%";

  if(percent === 100){
    resetBtn.style.display = "block";
  }
}

/* NAV */
function renderNav(){
  navBar.innerHTML="";
  questions.forEach((_,i)=>{
    let div=document.createElement("div");
    div.className="nav-item";
    div.innerText=i+1;

    if(questionState[i]==="correct"){
      div.style.background="#4CAF50";
      div.style.color="white";
    }

    if(i===current){
      div.style.border="2px solid orange";
    }

    div.onclick=()=>{
      current=i;
      loadQuestion();
      saveProgress();
    };

    navBar.appendChild(div);
  });
}

  [...options.children].forEach(b=>b.classList.remove("selected"));
  selected=i;
  options.children[i].classList.add("selected");
}

      questionState[current]="correct";
      score+=20;

      shortInput.style.background="green";
      confetti();

    }else{
      score-=5;
      shortInput.style.background="red";

      setTimeout(()=>{
        shortInput.value="";
        shortInput.style.background="";
      },500);
    }
  }

  updateScore();
  updateXP();
  renderNav();
  saveBest(); // 🔥 THÊM DÒNG NÀY

 if(correctCount === questions.length){
  saveFirstCompletion();
  document.getElementById("openCertBtn").style.display = "inline-block";

  setTimeout(()=>{
    showCertificate();
  },500);
}}

/* HINT */
function showHint(){

  if(questionState[current]==="correct") return;

  const q = questions[current];

  score -= 15;
  updateScore();

  // SINGLE
  if(q.type==="single"){
    let correct = q.a;
    options.children[correct].classList.add("correct");

    setTimeout(()=>{
      options.children[correct].classList.remove("correct");
    },1000);
  }

  // TRUE FALSE
 if(q.type==="truefalse"){
  q.a.forEach((ans,i)=>{
    const {btnD, btnS} = tfButtons[i];

    if(ans){
      btnD.classList.add("correct");
    }else{
      btnS.classList.add("correct");
    }
  });

  setTimeout(()=>{
    tfButtons.forEach(({btnD,btnS})=>{
      btnD.classList.remove("correct");
      btnS.classList.remove("correct");
    });
  },1000);
}

  // SHORT
  if(q.type==="short"){
    shortInput.value = q.a;
    shortInput.style.background="green";

    setTimeout(()=>{
      shortInput.value="";
      shortInput.style.background="";
    },1000);
  }

  saveProgress();
  saveToCloud();
}

 tfCorrectState = {}; // 🔥 THÊM DÒNG NÀY

  updateScore();
  updateXP();
  loadQuestion();
}

  async function mintNFT(){

  const btn = document.getElementById("mintBtn");

  try{

    btn.innerText = "⏳ Đang tạo chứng chỉ...";
    btn.disabled = true;

    const imageFile = await generateImage();

    btn.innerText = "📤 Đang upload ảnh...";
    const imageCID = await uploadToIPFS(imageFile);

    btn.innerText = "🧾 Đang tạo metadata...";
    const metadata = await createMetadata(imageCID);

    const metadataCID = await uploadMetadata(metadata);

    const tokenURI = `https://gateway.pinata.cloud/ipfs/${metadataCID}`;

    // 🔥 WALLET
    if(!window.ethereum){
      btn.innerText = "❌ Cần MetaMask";
      return;
    }

    const provider = new ethers.BrowserProvider(window.ethereum);
    await provider.send("eth_requestAccounts", []);

    const signer = await provider.getSigner();
    const userAddress = await signer.getAddress();

    const contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);
// 🔒 CHECK ONCHAIN (QUAN TRỌNG)
const alreadyMinted = await contract.hasMinted(userAddress, lessonId);

if(alreadyMinted){
  btn.innerText = "✅ Đã mint rồi";
  return;
}
    // 🔒 Firebase check
    const snap = await getDoc(doc(db,"users",userId,"lessons",lessonId));

    if(!snap.exists() || !snap.data().firstScore){
      btn.innerText = "❌ Chưa hoàn thành bài";
      return;
    }

    // 🔒 CHECK FIREBASE minted (NEW)
    if(snap.data().minted){
      btn.innerText = "✅ Đã mint rồi";
      return;
    }

    btn.innerText = "🦊 Xác nhận trên MetaMask...";

    const tx = await contract.mint(tokenURI, lessonId);

    btn.innerText = "⛓ Đang xử lý giao dịch...";
    await tx.wait();

   btn.innerText = "✅ Minted";
btn.disabled = true; // 🔥 KHÓA NÚT
document.getElementById("openCertBtn").innerText = "🏆 Xem chứng chỉ"; // 🔥 UX đẹp hơn

    await setDoc(doc(db,"users",userId,"lessons",lessonId),{
      minted: true
    }, { merge:true });

  }catch(err){
    console.error(err);
    btn.innerText = "❌ Lỗi - thử lại";
    btn.disabled = false;
  }
}
